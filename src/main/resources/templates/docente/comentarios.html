<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Comentarios de Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/docente/inicio">📚 Panel Docente</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light">Cerrar sesión</button>
        </form>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>💬 Comentarios de Alumnos</h2>
        <a href="/docente/inicio" class="btn btn-secondary">Volver al Dashboard</a>
    </div>

    <div th:if="${param.exito}" class="alert alert-success">
        ✅ Respuesta enviada correctamente.
    </div>

    <div th:if="${comentarios.isEmpty()}" class="alert alert-info text-center">
        📭 No hay comentarios de alumnos por el momento.
    </div>

    <div th:each="comentario : ${comentarios}" class="card mb-3">
        <div class="card-header bg-light">
            <div class="row">
                <div class="col-md-6">
                    <strong>👨‍🎓 Alumno:</strong> <span th:text="${comentario.alumno.nombre}"></span>
                </div>
                <div class="col-md-6 text-end">
                    <strong>📚 Materia:</strong> <span th:text="${comentario.materia.nombre}"></span>
                </div>
            </div>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-12 mb-3">
                    <div class="alert alert-secondary">
                        <strong>💬 Comentario:</strong><br>
                        <span th:text="${comentario.mensaje}"></span>
                        <br>
                        <small class="text-muted">📅 <span th:text="${#temporals.format(comentario.fechaComentario, 'dd/MM/yyyy HH:mm')}"></span></small>
                    </div>
                </div>

                <div th:if="${comentario.respuesta != null}" class="col-md-12 mb-3">
                    <div class="alert alert-success">
                        <strong>✅ Tu respuesta:</strong><br>
                        <span th:text="${comentario.respuesta}"></span>
                        <br>
                        <small class="text-muted">📅 Respondido: <span th:text="${#temporals.format(comentario.fechaRespuesta, 'dd/MM/yyyy HH:mm')}"></span></small>
                    </div>
                </div>

                <div th:if="${comentario.respuesta == null}" class="col-md-12">
                    <form th:action="@{/docente/comentarios/responder/{id}(id=${comentario.id})}" method="post">
                        <div class="input-group">
                            <input type="text" name="respuesta" class="form-control" placeholder="Escribe tu respuesta aquí..." required>
                            <button type="submit" class="btn btn-primary">📨 Responder</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
