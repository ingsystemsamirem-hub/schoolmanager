<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Materias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>📚 Lista de Materias</h1>
        <div>
            <a href="/docente/materias/nueva" class="btn btn-success">+ Nueva Materia</a>
            <a href="/docente/inicio" class="btn btn-secondary">Volver al Dashboard</a>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="materia : ${materias}">
                    <td th:text="${materia.id}"></td>
                    <td th:text="${materia.codigo}"></td>
                    <td th:text="${materia.nombre}"></td>
                    <td>
                        <a th:href="@{/docente/materias/editar/{id}(id=${materia.id})}" class="btn btn-warning btn-sm">✏️ Editar</a>
                        <a th:href="@{/docente/materias/eliminar/{id}(id=${materia.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Eliminar esta materia?')">🗑️ Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn btn-danger">Cerrar sesión</button>
        </form>
    </div>
</div>
</body>
</html>
