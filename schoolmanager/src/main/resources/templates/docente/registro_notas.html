<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Notas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>✏️ Registrar Notas</h1>
        <a href="/docente/inicio" class="btn btn-secondary">Volver al Dashboard</a>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header bg-warning text-white">
                    <h4>Registrar Nota</h4>
                </div>
                <div class="card-body">
                    <div th:if="${param.exito}" class="alert alert-success">
                        ✅ Nota guardada exitosamente
                    </div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/docente/notas/guardar}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Alumno</label>
                                <select name="alumnoId" class="form-select" required>
                                    <option value="">Seleccione alumno</option>
                                    <option th:each="alumno : ${alumnos}"
                                            th:value="${alumno.id}"
                                            th:text="${alumno.nombre}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Materia</label>
                                <select name="materiaId" class="form-select" required>
                                    <option value="">Seleccione materia</option>
                                    <option th:each="materia : ${materias}"
                                            th:value="${materia.id}"
                                            th:text="${materia.nombre}">
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Nota (0-10)</label>
                                <input type="number" step="0.1" name="notaValor" class="form-control" min="0" max="10" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Corte</label>
                                <select name="corte" class="form-select" required>
                                    <option value="">Seleccione corte</option>
                                    <option th:each="corte : ${cortes}" th:value="${corte}" th:text="${corte}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-primary">💾 Guardar Nota</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-3">
        <form th:action="@{/logout}" method="post" style="display: inline;">
            <button type="submit" class="btn btn-danger">Cerrar sesión</button>
        </form>
    </div>
</div>
</body>
</html>
