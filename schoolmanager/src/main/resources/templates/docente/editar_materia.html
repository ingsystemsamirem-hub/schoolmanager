<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Materia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-warning text-white">
                    <h4>✏️ Editar Materia</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/docente/materias/actualizar/{id}(id=${materia.id})}" th:object="${materia}" method="post">
                        <div class="mb-3">
                            <label>Nombre de la Materia</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Código</label>
                            <input type="text" th:field="*{codigo}" class="form-control" required>
                        </div>
                        <div class="text-center">
                            <button type="submit" class="btn btn-warning">💾 Actualizar</button>
                            <a href="/docente/materias" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
